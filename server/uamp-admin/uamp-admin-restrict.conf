# Restrict the UAMP catalog admin page (index.php) to the local networks.
# music.json and the station images stay publicly reachable (the Android app
# downloads them). Managed for the "Internet Radio" app.
#
# Deployed on the server (192.168.120.126) as:
#   /etc/apache2/conf-available/uamp-admin-restrict.conf
#   a2enconf uamp-admin-restrict && systemctl reload apache2
#
# A global <Directory> block is used (instead of .htaccess) because the server
# has `AllowOverride None`, and it applies regardless of which vhost (80/443)
# serves the path.
<Directory "/var/www/html/uamp">
    <Files "index.php">
        Require ip 192.168.120.0/24
        Require ip 192.168.122.0/24
        Require ip 127.0.0.1 ::1
    </Files>
</Directory>
